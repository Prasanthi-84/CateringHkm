[build]
  command = "cd frontend && npm install && npm run build && cd .. && rm -rf dist && mv frontend/dist dist"
  publish = "dist"
  functions = "api"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundle = true
